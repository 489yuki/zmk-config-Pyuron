name: Generate keymap PDF

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "config/**"
      - "generate_keymap_pdf.py"
      - "requirements-keymap-pdf.txt"
      - ".github/workflows/keymap-pdf.yml"

jobs:
  render-keymap-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements-keymap-pdf.txt"

      - name: Install PDF dependencies
        run: python -m pip install --upgrade pip -r requirements-keymap-pdf.txt

      - name: Generate keymap PDF
        run: >
          python generate_keymap_pdf.py
          --keymap config/Pyuron.keymap
          --layout config/Pyuron.json
          --metadata config/keymap_pdf_metadata.json
          --output artifacts/keymap/Pyuron-keymap.pdf

      - name: Upload keymap PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pyuron-keymap-pdf
          path: artifacts/keymap/Pyuron-keymap.pdf
          if-no-files-found: error
          retention-days: 30
